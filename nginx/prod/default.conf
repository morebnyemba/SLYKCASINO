# =============================================================================
#  SLYK CASINO — Production Nginx Config
#  Routing:
#    /.well-known/acme-challenge/  -> certbot webroot (port 80 only)
#    / (port 80)                   -> 301 redirect to HTTPS
#    /api/                         -> django:8000
#    /django-admin/                -> django:8000
#    /django-static/               -> django:8000
#    /ws/                          -> erlang:8080  (WebSocket upgrade)
#    /admin-portal                 -> admin_frontend:3000
#    /                             -> player_frontend:3000
# =============================================================================

# --- WebSocket connection upgrade mapping ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Upstreams ---
upstream player_upstream {
    server player_frontend:3000;
    keepalive 32;
}
upstream admin_upstream {
    server admin_frontend:3000;
    keepalive 32;
}
upstream django_upstream {
    server django:8000;
    keepalive 32;
}
upstream erlang_upstream {
    server erlang:8080;
}

# Shared proxy headers
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# -----------------------------------------------------------------------------
# :80 — ACME http-01 challenge passthrough + permanent redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot writes challenge files here
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# :443 — TLS termination + application routing
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/zimgrow.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zimgrow.shop/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # --- General ---
    client_max_body_size 20m;
    server_tokens off;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/css text/plain application/json application/javascript application/x-javascript text/javascript;

    # Keep ACME location available on 443 too (edge cases)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # =========================================================================
    #  1) Django REST API
    # =========================================================================
    location /api/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =========================================================================
    #  2) Django admin — raw DB intervention (superusers only)
    # =========================================================================
    location /django-admin/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Django admin static assets (served by WhiteNoise from gunicorn)
    location /django-static/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =========================================================================
    #  3) Erlang realtime engine — WebSocket (live chat + betting feeds)
    # =========================================================================
    location /ws/ {
        proxy_pass http://erlang_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # =========================================================================
    #  4) Next.js Admin UI  (app MUST set basePath: '/admin-portal')
    # =========================================================================
    location /admin-portal {
        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # =========================================================================
    #  5) Next.js Player UI — catch-all root
    # =========================================================================
    location / {
        proxy_pass http://player_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
