# =============================================================================
#  LOCAL DEV override — auto-merged by `docker compose` (no -f needed).
#  Hot-reload Next.js (dev target), HTTP-only nginx, certbot disabled.
#
#  Dev:   docker compose up          (this override is applied automatically)
#  Prod:  docker compose -f docker-compose.yml up -d   (override NOT applied)
#
#  NEXT_PUBLIC_* are RUNTIME envs here (dev server reads them live) — unlike
#  production, where they are baked in at build time.
# =============================================================================

services:
  player_frontend:
    build:
      target: dev
    command: pnpm --filter web exec next dev -H 0.0.0.0 -p 3000
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
      NEXT_PUBLIC_SITE_URL: http://localhost
    volumes:
      - ./:/app                                    # live source
      - player_root_node_modules:/app/node_modules # keep container's Linux install
      - player_web_node_modules:/app/apps/web/node_modules
    ports:
      - "3000:3000"                                # direct access (bypasses nginx)

  admin_frontend:
    build:
      target: dev
    command: pnpm --filter admin exec next dev -H 0.0.0.0 -p 3000
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
      NEXT_PUBLIC_SITE_URL: http://localhost/admin-portal
    volumes:
      - ./:/app
      - admin_root_node_modules:/app/node_modules
      - admin_admin_node_modules:/app/apps/admin/node_modules
    ports:
      - "3001:3000"                                # direct: http://localhost:3001/admin-portal

  nginx:
    environment:
      DOMAIN: localhost
    volumes:
      # Same mount target as prod => this REPLACES the prod template dir.
      - ./nginx/templates-dev:/etc/nginx/templates:ro

  # No TLS in dev — keep certbot from starting (excluded unless this profile is on).
  certbot:
    profiles: ["donotstart"]

volumes:
  player_root_node_modules:
  player_web_node_modules:
  admin_root_node_modules:
  admin_admin_node_modules:
